<html lang="zh-HK">
<head>
    <meta charset="UTF-8">

        :root {
            --primary-color: #E53935;
            --secondary-color: #FFC107;
            --bg-color: #FFF8E1;
            --text-color: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            padding: 40px 20px;
            width: 90%;
            max-width: 600px;
            border: 4px solid var(--primary-color);
        }
        h1 { color: var(--primary-color); font-size: 2.2em; margin-bottom: 10px; }
        .emoji-display { font-size: 4.5em; margin: 30px 0; letter-spacing: 5px; }
        .category-tag {
            display: inline-block;
            background-color: var(--secondary-color);
            color: #000;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 20px;
        }
        .hint-text {
            font-size: 1.2em;
            color: #555;
            font-weight: bold;
            background-color: #f0f0f0;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 12px;
            margin-bottom: 10px;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 1.3em;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 20px;
            border-bottom: 2px dashed var(--secondary-color);
            padding-bottom: 10px;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 15px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s, filter 0.2s;
            flex: 1;
            min-width: 120px;
        }
        .btn:active:not(:disabled) { transform: scale(0.95); }
        .btn:hover:not(:disabled) { filter: brightness(1.1); }
        .btn-success { background-color: #4CAF50; }
        .btn-warning { background-color: #FF9800; }
        .btn-secondary { background-color: #9E9E9E; }
        .btn-danger { background-color: #F44336; }
        .btn-large { width: 100%; max-width: 300px; font-size: 1.3em; padding: 20px; }
        
        /* 禁用狀態樣式 */
        .btn:disabled {
            background-color: #cccccc;
            color: #666666;
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        #game-screen, #end-screen { display: none; }
        .answer-text {
            font-size: 1.8em;
            color: #2196F3;
            font-weight: bold;
            min-height: 1.5em;
            margin-bottom: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .show-answer { opacity: 1; }
        
        @media (max-width: 480px) {
            .emoji-display { font-size: 3.5em; }
            h1 { font-size: 1.8em; }
            .btn { font-size: 1em; padding: 12px 10px; }
            .stats { font-size: 1.1em; }
        }
    </style>
</head>

<div class="container" id="start-screen">

        3. 遇到難題可跳過，但<strong>整場最多只能跳過 3 次</strong>！
    </p>
    <button class="btn btn-large" onclick="startGame()">接受挑戰 🚀</button>

<div class="container" id="game-screen">

    <div class="answer-text" id="answer">答案在此</div>

</div>

    // 洗牌演算法 (Fisher-Yates Shuffle)
    function shuffleArray(array) {
        let shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
    }

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('end-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        
        // 重置所有狀態
        score = 0;
        timeLeft = 90;
        lives = 5;
        skipsLeft = 3;
        
        // 更新 UI 顯示
        document.getElementById('score').innerText = score;
        document.getElementById('time').innerText = timeLeft;
        document.getElementById('lives').innerText = lives;
        
        const skipBtn = document.getElementById('skip-btn');
        skipBtn.innerText = `⏭️ 跳過 (餘${skipsLeft})`;
        skipBtn.disabled = false; // 確保按鈕可用
        
        // 開始時打亂 100 題
        gameQuestions = shuffleArray(allQuestions);
        currentQIndex = 0;
        
        loadQuestion();
        
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('time').innerText = timeLeft;
            if (timeLeft <= 0) {
                endGame('time_up');
            }
        }, 1000);
    }

    function loadQuestion() {
        if (currentQIndex >= gameQuestions.length) {
            gameQuestions = shuffleArray(allQuestions);
            currentQIndex = 0;
        }
        
        const q = gameQuestions[currentQIndex];
        document.getElementById('emoji').innerText = q.emoji;
        document.getElementById('category').innerText = q.category;
        
        const charCount = q.answer.replace(/[\s\(\)-]/g, '').length;
        document.getElementById('hint').innerText = `💡 提示：共 ${charCount} 字`;
        
        document.getElementById('answer').innerText = q.answer;
        document.getElementById('answer').classList.remove('show-answer');
    }

    function showAnswer() {
        document.getElementById('answer').classList.add('show-answer');
    }

    // 處理答對、答錯、跳過邏輯
    function handleAnswer(type) {
        if (type === 'correct') {
            score++;
            document.getElementById('score').innerText = score;
            
        } else if (type === 'wrong') {
            lives--;
            document.getElementById('lives').innerText = lives;
            if (lives <= 0) {
                endGame('lives_out');
                return; // 生命耗盡，不載入下一題
            }
            
        } else if (type === 'skip') {
            if (skipsLeft <= 0) return; // 防呆機制
            skipsLeft--;
            const skipBtn = document.getElementById('skip-btn');
            skipBtn.innerText = `⏭️ 跳過 (餘${skipsLeft})`;
            
            // 當次數用盡時禁用按鈕
            if (skipsLeft <= 0) {
                skipBtn.disabled = true;
            }
        }
        
        currentQIndex++;
        loadQuestion();
    }

    // 遊戲結束邏輯
    function endGame(reason) {
        clearInterval(timerInterval);
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('end-screen').style.display = 'block';
        
        // 根據結束原因顯示不同標題
        const titleEl = document.getElementById('end-title');
        if (reason === 'lives_out') {
            titleEl.innerText = '💀 遊戲結束！生命耗盡';
            titleEl.style.color = '#F44336';
        } else {
            titleEl.innerText = '⏰ 時間到！';
            titleEl.style.color = 'var(--primary-color)';
        }
        
        document.getElementById('final-score').innerText = score;
    }

    function resetGame() {
        document.getElementById('end-screen').style.display = 'none';
        document.getElementById('start-screen').style.display = 'block';
    }
</script>

</body>
</html>
